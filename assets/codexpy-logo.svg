<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 260" width="920" height="260">
  <!-- Dark rounded square with </ symbol -->
  <rect x="10" y="20" width="220" height="220" rx="48" fill="#1A1A1F"/>
  <text x="120" y="130"
        font-family="Consolas, 'Courier New', ui-monospace, monospace"
        font-size="110" font-weight="800" fill="#FFD43B"
        text-anchor="middle" dominant-baseline="central">&lt;/</text>

  <!-- Codex wordmark -->
  <text x="270" y="130"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
        font-size="130" font-weight="700" fill="#1A1A1F"
        letter-spacing="-2" dominant-baseline="central">Codex</text>

  <!-- Yellow rounded square with Py -->
  <rect x="710" y="55" width="200" height="150" rx="36" fill="#FFD43B"/>
  <text x="810" y="130"
        font-family="Consolas, 'Courier New', ui-monospace, monospace"
        font-size="92" font-weight="800" fill="#2C5F8A"
        text-anchor="middle" dominant-baseline="central">Py</text>
</svg>
